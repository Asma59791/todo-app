<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASKFLOW — To-Do App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: rgba(255,255,255,0.06);
    --accent: #7c6bff;
    --accent2: #ff6b9d;
    --accent3: #6bffca;
    --text: #f0eeff;
    --muted: #6b6b8a;
    --danger: #ff4d6d;
    --success: #6bffca;
    --warn: #ffb347;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 10%, rgba(124,107,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 400px 600px at 85% 80%, rgba(107,255,202,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 500px 300px at 60% 50%, rgba(255,107,157,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    margin-bottom: 48px;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .logo-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(124,107,255,0.12);
    border: 1px solid rgba(124,107,255,0.3);
    border-radius: 100px;
    padding: 4px 14px 4px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .logo-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  h1 {
    font-size: clamp(42px, 8vw, 64px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
    animation: slideUp 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    transition: border-color 0.3s;
  }

  .stat:hover { border-color: rgba(124,107,255,0.3); }

  .stat-num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-num.total { color: var(--accent); }
  .stat-num.done { color: var(--accent3); }
  .stat-num.pending { color: var(--accent2); }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Progress */
  .progress-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 28px;
    animation: slideUp 0.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .progress-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .progress-pct {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent3);
  }

  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }

  /* Input */
  .input-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 28px;
    animation: slideUp 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    transition: border-color 0.3s;
  }

  .input-section:focus-within {
    border-color: rgba(124,107,255,0.4);
    box-shadow: 0 0 0 3px rgba(124,107,255,0.08);
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }

  .task-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: all 0.3s;
  }

  .task-input::placeholder { color: var(--muted); }
  .task-input:focus {
    border-color: rgba(124,107,255,0.5);
    background: rgba(124,107,255,0.05);
  }

  .add-btn {
    background: linear-gradient(135deg, var(--accent), #9b8aff);
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .add-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(124,107,255,0.4);
  }

  .add-btn:active { transform: translateY(0); }

  .input-meta {
    display: flex;
    gap: 10px;
  }

  .priority-select, .emoji-select {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    outline: none;
    cursor: pointer;
    transition: border-color 0.3s;
    appearance: none;
  }

  .priority-select:focus, .emoji-select:focus {
    border-color: rgba(124,107,255,0.4);
    color: var(--text);
  }

  option { background: #1a1a28; }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: slideUp 0.6s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.05em;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .filter-btn:hover:not(.active) {
    border-color: rgba(124,107,255,0.4);
    color: var(--text);
  }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: slideUp 0.6s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .task-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    animation: taskIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    position: relative;
    overflow: hidden;
  }

  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
    transition: opacity 0.3s;
  }

  .task-item[data-priority="high"]::before { background: var(--danger); }
  .task-item[data-priority="medium"]::before { background: var(--warn); }
  .task-item[data-priority="low"]::before { background: var(--accent3); }

  .task-item:hover {
    border-color: rgba(124,107,255,0.25);
    transform: translateX(4px);
    box-shadow: -4px 0 24px rgba(124,107,255,0.08);
  }

  .task-item.completed {
    opacity: 0.5;
  }

  .task-item.completed .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-item.removing {
    animation: taskOut 0.3s ease forwards;
  }

  /* Checkbox */
  .checkbox {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
    background: transparent;
    position: relative;
  }

  .task-item.completed .checkbox {
    background: linear-gradient(135deg, var(--accent3), #3de8a0);
    border-color: transparent;
  }

  .checkbox::after {
    content: '';
    width: 10px; height: 6px;
    border-left: 2px solid #0a0a0f;
    border-bottom: 2px solid #0a0a0f;
    transform: rotate(-45deg) translateY(-1px) scale(0);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .task-item.completed .checkbox::after {
    transform: rotate(-45deg) translateY(-1px) scale(1);
  }

  .task-emoji {
    font-size: 20px;
    flex-shrink: 0;
    line-height: 1;
  }

  .task-content { flex: 1; min-width: 0; }

  .task-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    transition: all 0.3s;
    word-break: break-word;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .priority-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .priority-badge.high { background: rgba(255,77,109,0.15); color: var(--danger); }
  .priority-badge.medium { background: rgba(255,179,71,0.15); color: var(--warn); }
  .priority-badge.low { background: rgba(107,255,202,0.15); color: var(--accent3); }

  .task-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .task-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transform: translateX(8px);
    transition: all 0.25s;
    flex-shrink: 0;
  }

  .task-item:hover .task-actions {
    opacity: 1;
    transform: translateX(0);
  }

  .action-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }

  .action-btn.delete:hover {
    background: rgba(255,77,109,0.15);
    border-color: rgba(255,77,109,0.4);
    color: var(--danger);
  }

  .action-btn.edit:hover {
    background: rgba(124,107,255,0.15);
    border-color: rgba(124,107,255,0.4);
    color: var(--accent);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }

  .empty-state.visible { display: block; }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }

  .empty-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--muted);
  }

  .empty-sub {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: rgba(107,107,138,0.6);
  }

  /* Clear completed */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding: 0 4px;
  }

  .toolbar-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .clear-btn {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .clear-btn:hover {
    color: var(--danger);
    background: rgba(255,77,109,0.08);
  }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }

  .toast {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    pointer-events: auto;
  }

  .toast.success { border-color: rgba(107,255,202,0.3); color: var(--accent3); }
  .toast.error { border-color: rgba(255,77,109,0.3); color: var(--danger); }
  .toast.info { border-color: rgba(124,107,255,0.3); color: var(--accent); }
  .toast.hide { animation: toastOut 0.3s ease forwards; }

  /* Animations */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes taskIn {
    from { opacity: 0; transform: translateX(-20px) scale(0.96); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }

  @keyframes taskOut {
    to { opacity: 0; transform: translateX(30px) scale(0.9); height: 0; padding: 0; margin: 0; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(30px) scale(0.9); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }

  @keyframes toastOut {
    to { opacity: 0; transform: translateX(30px) scale(0.9); }
  }

  @media (max-width: 480px) {
    .input-row { flex-direction: column; }
    .add-btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">

  <header>
    <div class="logo-tag">
      <div class="logo-dot"></div>
      syntecxhub · week 2 · project 1
    </div>
    <h1>Task<span>Flow</span></h1>
    <p class="subtitle">// your intelligent productivity layer</p>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num total" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num done" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num pending" id="stat-pending">0</div>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-label">Completion</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="input-section">
    <div class="input-row">
      <input class="task-input" id="task-input" type="text" placeholder="What needs to be done? ✦" maxlength="120">
      <button class="add-btn" onclick="addTask()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Task
      </button>
    </div>
    <div class="input-meta">
      <select class="priority-select" id="priority-select">
        <option value="low">🟢 Low Priority</option>
        <option value="medium" selected>🟡 Medium Priority</option>
        <option value="high">🔴 High Priority</option>
      </select>
      <select class="emoji-select" id="emoji-select">
        <option value="📋">📋 Task</option>
        <option value="🎯">🎯 Goal</option>
        <option value="💡">💡 Idea</option>
        <option value="🔥">🔥 Urgent</option>
        <option value="📚">📚 Study</option>
        <option value="💻">💻 Dev</option>
        <option value="🎨">🎨 Design</option>
        <option value="🧪">🧪 Test</option>
        <option value="🚀">🚀 Launch</option>
        <option value="✨">✨ Other</option>
      </select>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" data-filter="completed" onclick="setFilter('completed', this)">Completed</button>
    <button class="filter-btn" data-filter="high" onclick="setFilter('high', this)">🔴 High</button>
    <button class="filter-btn" data-filter="medium" onclick="setFilter('medium', this)">🟡 Medium</button>
    <button class="filter-btn" data-filter="low" onclick="setFilter('low', this)">🟢 Low</button>
  </div>

  <div class="toolbar">
    <span class="toolbar-label" id="task-count">0 tasks</span>
    <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="empty-state" id="empty-state">
    <div class="empty-icon">🌌</div>
    <div class="empty-title">All clear</div>
    <div class="empty-sub">// no tasks match this view</div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
  let currentFilter = 'all';
  let editingId = null;

  function saveTasks() {
    localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2);
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' · ' +
           d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) { showToast('⚡ Type something first!', 'error'); input.focus(); return; }

    const priority = document.getElementById('priority-select').value;
    const emoji = document.getElementById('emoji-select').value;

    const task = { id: generateId(), text, priority, emoji, completed: false, createdAt: Date.now() };
    tasks.unshift(task);
    saveTasks();
    input.value = '';
    renderTasks();
    updateStats();
    showToast(`${emoji} Task added!`, 'success');
    input.focus();
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.completed = !task.completed;
      saveTasks();
      renderTasks();
      updateStats();
      if (task.completed) showToast('✅ Task complete!', 'success');
    }
  }

  function deleteTask(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderTasks();
        updateStats();
      }, 280);
    }
    showToast('🗑 Task removed', 'info');
  }

  function editTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    const newText = prompt('Edit task:', task.text);
    if (newText !== null && newText.trim()) {
      task.text = newText.trim();
      saveTasks();
      renderTasks();
      showToast('✏️ Task updated!', 'info');
    }
  }

  function clearCompleted() {
    const count = tasks.filter(t => t.completed).length;
    if (!count) { showToast('No completed tasks', 'error'); return; }
    tasks = tasks.filter(t => !t.completed);
    saveTasks();
    renderTasks();
    updateStats();
    showToast(`🧹 Cleared ${count} task${count > 1 ? 's' : ''}`, 'success');
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  function getFilteredTasks() {
    switch (currentFilter) {
      case 'pending': return tasks.filter(t => !t.completed);
      case 'completed': return tasks.filter(t => t.completed);
      case 'high': return tasks.filter(t => t.priority === 'high');
      case 'medium': return tasks.filter(t => t.priority === 'medium');
      case 'low': return tasks.filter(t => t.priority === 'low');
      default: return tasks;
    }
  }

  function renderTasks() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty-state');
    const filtered = getFilteredTasks();

    document.getElementById('task-count').textContent = `${filtered.length} task${filtered.length !== 1 ? 's' : ''}`;

    if (!filtered.length) {
      list.innerHTML = '';
      empty.classList.add('visible');
      return;
    }

    empty.classList.remove('visible');
    list.innerHTML = filtered.map(task => `
      <div class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}" data-priority="${task.priority}">
        <div class="checkbox" onclick="toggleTask('${task.id}')"></div>
        <div class="task-emoji">${task.emoji}</div>
        <div class="task-content">
          <div class="task-text">${escapeHtml(task.text)}</div>
          <div class="task-meta">
            <span class="priority-badge ${task.priority}">${task.priority}</span>
            <span class="task-time">${formatTime(task.createdAt)}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="action-btn edit" onclick="editTask('${task.id}')" title="Edit">✏️</button>
          <button class="action-btn delete" onclick="deleteTask('${task.id}')" title="Delete">🗑</button>
        </div>
      </div>
    `).join('');
  }

  function updateStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    const pending = total - done;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('hide');
      setTimeout(() => toast.remove(), 300);
    }, 2500);
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Initial render
  renderTasks();
  updateStats();
</script>
</body>
</html>
